<svg xmlns="http://www.w3.org/2000/svg" width="660" height="1620" viewBox="0 0 660 1620" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">LangGraph 파이프라인</title>
  <desc id="desc">사용자 요청을 받아 조건을 추출하고 정규화한 뒤, 공고를 수집하고 검색해 응답을 생성하는 흐름도</desc>
  <defs>
    <linearGradient id="borderGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F56FF"/>
      <stop offset="55%" stop-color="#8B49FF"/>
      <stop offset="100%" stop-color="#FF235A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#111111"/>
    </marker>
    <style>
      text {
        fill: #343434;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-anchor: middle;
      }
      .node {
        fill: #F5F3FF;
        stroke: url(#borderGradient);
        stroke-width: 3;
        filter: url(#shadow);
      }
      .pill {
        rx: 44;
      }
      .main-line {
        stroke: #111111;
        stroke-width: 3.5;
        fill: none;
        marker-end: url(#arrow);
      }
      .branch-line {
        stroke: #111111;
        stroke-width: 2.5;
        stroke-dasharray: 8 8;
        fill: none;
        marker-end: url(#arrow);
      }
    </style>
  </defs>

  <rect width="660" height="1620" fill="#FFFFFF"/>

  <rect class="node" x="190" y="18" width="280" height="88" rx="44"/>
  <rect class="node" x="110" y="150" width="440" height="92" rx="12"/>
  <rect class="node" x="110" y="320" width="440" height="92" rx="12"/>
  <rect class="node" x="110" y="490" width="440" height="92" rx="12"/>
  <rect class="node" x="310" y="670" width="340" height="92" rx="12"/>
  <rect class="node" x="335" y="840" width="290" height="92" rx="12"/>
  <rect class="node" x="315" y="1010" width="330" height="92" rx="12"/>
  <rect class="node" x="315" y="1180" width="330" height="92" rx="12"/>
  <rect class="node" x="315" y="1350" width="330" height="92" rx="12"/>
  <rect x="20" y="1086" width="190" height="56" rx="0" fill="#F1F0FB"/>
  <rect class="node" x="190" y="1510" width="280" height="88" rx="44"/>

  <line class="main-line" x1="330" y1="106" x2="330" y2="148"/>
  <line class="main-line" x1="330" y1="242" x2="330" y2="318"/>
  <line class="main-line" x1="330" y1="412" x2="330" y2="488"/>
  <line class="main-line" x1="480" y1="762" x2="480" y2="838"/>
  <line class="main-line" x1="480" y1="932" x2="480" y2="1008"/>
  <line class="main-line" x1="480" y1="1102" x2="480" y2="1178"/>
  <line class="main-line" x1="480" y1="1272" x2="480" y2="1348"/>
  <polyline class="main-line" points="480,1442 480,1510 411,1554"/>

  <polyline class="branch-line" points="150,582 60,650 60,1440 206,1553"/>
  <polyline class="branch-line" points="470,582 620,650 480,668"/>

  <text x="330" y="72" font-size="30" font-weight="600" dominant-baseline="middle">요청 접수</text>
  <text x="330" y="196" font-size="28" font-weight="600" dominant-baseline="middle">LLM 인스턴스 준비</text>
  <text x="330" y="366" font-size="28" font-weight="600" dominant-baseline="middle">질문에서 조건 추출</text>
  <text x="330" y="536" font-size="28" font-weight="600" dominant-baseline="middle">조건 해석 및 정규화</text>
  <text x="480" y="716" font-size="26" font-weight="600" dominant-baseline="middle">대상 공고 URL 결정</text>
  <text x="480" y="886" font-size="26" font-weight="600" dominant-baseline="middle">공고 페이지 수집</text>
  <text x="480" y="1056" font-size="26" font-weight="600" dominant-baseline="middle">공고 핵심 정보 추출</text>
  <text x="480" y="1226" font-size="26" font-weight="600" dominant-baseline="middle">관련 공고 통합 검색</text>
  <text x="480" y="1396" font-size="26" font-weight="600" dominant-baseline="middle">사용자 답변 생성</text>
  <text x="115" y="1114" font-size="22" font-weight="600" dominant-baseline="middle">추가 정보 필요</text>
  <text x="330" y="1564" font-size="30" font-weight="600" dominant-baseline="middle">처리 종료</text>
</svg>
