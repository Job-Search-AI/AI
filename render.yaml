services:
  - type: web
    name: jobsearchai
    runtime: docker
    plan: free
    region: oregon
    branch: develop
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: USE_OPENAI_MODELS
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: NER_MODEL_NAME
        value: gpt-5-nano
      - key: RESPONSE_MODEL_NAME
        value: gpt-5-nano
      - key: OPENAI_TIMEOUT_SECONDS
        value: "180"
      - key: OPENAI_MAX_RETRIES
        value: "2"
      - key: MAX_JOBS_DEFAULT
        value: "10"
      - key: MAX_JOBS_LIMIT
        value: "10"
      - key: QUERY_CONCURRENCY
        value: "1"
      - key: QUERY_BUSY_TIMEOUT_SECONDS
        value: "45"
      - key: MEM_LOG_ENABLED
        value: "true"
      - key: SELF_PING_ENABLED
        value: "false"
      - key: SELF_PING_INTERVAL_SECONDS
        value: "300"
