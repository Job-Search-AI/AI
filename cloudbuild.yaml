substitutions:
  _AR_REGION: us-central1
  _AR_REPO: job-search-openai
  _IMAGE_NAME: ai
  _VM_NAME: instance-20260312-140429
  _VM_ZONE: us-central1-c
  _SERVICE_NAME: jobsearch-api
  _CONTAINER_NAME: jobsearch-api

steps:
  - id: Build image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile
      - -t
      - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$BUILD_ID
      - -t
      - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest
      - .

  - id: Push image (build id)
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$BUILD_ID

  - id: Push image (latest)
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest

  - id: Rollout VM (restart service)
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud compute ssh "${_VM_NAME}" \
          --project="$PROJECT_ID" \
          --zone="${_VM_ZONE}" \
          --quiet \
          --command="set -euo pipefail; IMAGE_REPO=${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}; sudo systemctl restart ${_SERVICE_NAME}; sleep 5; sudo systemctl is-active ${_SERVICE_NAME}; OLD_IMAGE_IDS=\$(sudo docker images \"\${IMAGE_REPO}\" --no-trunc --format '{{.ID}}' | awk '!seen[\$0]++' | tail -n +2); if [ -n \"\${OLD_IMAGE_IDS}\" ]; then echo \"\${OLD_IMAGE_IDS}\" | xargs -r sudo docker rmi -f; fi; sudo docker inspect ${_CONTAINER_NAME} --format 'container_image_id={{.Image}} started={{.State.StartedAt}}'; sudo docker image inspect \${IMAGE_REPO}:latest --format 'latest_id={{.Id}} repodigests={{.RepoDigests}}'; echo '[kept-images]'; sudo docker images \"\${IMAGE_REPO}\" --format 'repo={{.Repository}} tag={{.Tag}} id={{.ID}} created={{.CreatedSince}}'"

  - id: Cleanup old images in Artifact Registry
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -ceu
      - |
        IMAGE_REPO="${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}"
        OLD_DIGESTS="$(gcloud artifacts docker images list "${IMAGE_REPO}" \
          --project="$PROJECT_ID" \
          --include-tags \
          --sort-by=~UPDATE_TIME \
          --format='value(DIGEST)' \
          | awk 'NF' \
          | awk '!seen[$0]++' \
          | tail -n +2)"

        if [ -n "${OLD_DIGESTS}" ]; then
          while IFS= read -r DIGEST; do
            if [ -z "${DIGEST}" ]; then
              continue
            fi
            gcloud artifacts docker images delete "${IMAGE_REPO}@${DIGEST}" \
              --project="$PROJECT_ID" \
              --quiet \
              --delete-tags
          done <<< "${OLD_DIGESTS}"
        fi

        echo "[kept-digests]"
        gcloud artifacts docker images list "${IMAGE_REPO}" \
          --project="$PROJECT_ID" \
          --include-tags \
          --sort-by=~UPDATE_TIME \
          --limit=5 \
          --format='table(DIGEST,TAGS,UPDATE_TIME)'

  - id: Cleanup Artifact Digests
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -ceu
      - |
        REPO_PATH="${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}"

        LATEST_DIGEST="$(
          gcloud artifacts docker images list "$REPO_PATH" \
            --project="$PROJECT_ID" \
            --include-tags \
            --format='value(DIGEST,TAGS)' \
          | awk -F'\t' '$2 ~ /(^|,)latest(,|$)/ {print $1; exit}'
        )"

        if [[ -z "$LATEST_DIGEST" ]]; then
          echo "latest digest not found in Artifact Registry" >&2
          exit 1
        fi

        mapfile -t DIGESTS < <(
          gcloud artifacts docker images list "$REPO_PATH" \
            --project="$PROJECT_ID" \
            --format='value(DIGEST)' \
          | sed '/^$/d' \
          | sort -u
        )

        for DIGEST in "${DIGESTS[@]}"; do
          if [[ "$DIGEST" != "$LATEST_DIGEST" ]]; then
            gcloud artifacts docker images delete "${REPO_PATH}@${DIGEST}" \
              --project="$PROJECT_ID" \
              --delete-tags \
              --quiet
          fi
        done

        REMAINING_COUNT="$(
          gcloud artifacts docker images list "$REPO_PATH" \
            --project="$PROJECT_ID" \
            --format='value(DIGEST)' \
          | sed '/^$/d' \
          | sort -u \
          | wc -l \
          | tr -d ' '
        )"

        REMAINING_DIGEST="$(
          gcloud artifacts docker images list "$REPO_PATH" \
            --project="$PROJECT_ID" \
            --format='value(DIGEST)' \
          | sed '/^$/d' \
          | sort -u
        )"

        if [[ "$REMAINING_COUNT" -ne 1 ]]; then
          echo "expected 1 digest after cleanup, got $REMAINING_COUNT" >&2
          exit 1
        fi

        if [[ "$REMAINING_DIGEST" != "$LATEST_DIGEST" ]]; then
          echo "remaining digest ($REMAINING_DIGEST) is not latest ($LATEST_DIGEST)" >&2
          exit 1
        fi

        echo "artifact_cleanup_ok latest_digest=$LATEST_DIGEST count=$REMAINING_COUNT"

  - id: Cleanup VM App Images
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -ceu
      - |
        REPO_PATH="${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}"
        gcloud compute ssh "${_VM_NAME}" \
          --project="$PROJECT_ID" \
          --zone="${_VM_ZONE}" \
          --quiet \
          --command="bash -ceu 'set -euo pipefail; SERVICE=\"${_SERVICE_NAME}\"; CONTAINER=\"${_CONTAINER_NAME}\"; REPO_PATH=\"${REPO_PATH}\"; sudo systemctl is-active \"\$SERVICE\" >/dev/null; RUN_ID=\$(sudo docker inspect \"\$CONTAINER\" --format \"{{.Image}}\"); LATEST_ID=\$(sudo docker image inspect \"\$REPO_PATH:latest\" --format \"{{.Id}}\"); if [[ \"\$RUN_ID\" != \"\$LATEST_ID\" ]]; then echo \"running image (\$RUN_ID) does not match latest image (\$LATEST_ID)\" >&2; exit 1; fi; mapfile -t IDS < <(sudo docker images --no-trunc --format \"{{.Repository}} {{.ID}}\" | while read -r REPO ID; do if [[ \"\$REPO\" == \"\$REPO_PATH\" ]]; then echo \"\$ID\"; fi; done | sort -u); for ID in \"\${IDS[@]}\"; do if [[ \"\$ID\" != \"\$RUN_ID\" ]]; then sudo docker rmi -f \"\$ID\" || true; fi; done; COUNT=\$(sudo docker images --no-trunc --format \"{{.Repository}} {{.ID}}\" | while read -r REPO ID; do if [[ \"\$REPO\" == \"\$REPO_PATH\" ]]; then echo \"\$ID\"; fi; done | sort -u | wc -l | tr -d \" \"); if [[ \"\$COUNT\" -ne 1 ]]; then echo \"expected 1 app image on VM after cleanup, got \$COUNT\" >&2; exit 1; fi; RUN_ID_AFTER=\$(sudo docker inspect \"\$CONTAINER\" --format \"{{.Image}}\"); LATEST_ID_AFTER=\$(sudo docker image inspect \"\$REPO_PATH:latest\" --format \"{{.Id}}\"); if [[ \"\$RUN_ID_AFTER\" != \"\$LATEST_ID_AFTER\" ]]; then echo \"post-cleanup mismatch run=\$RUN_ID_AFTER latest=\$LATEST_ID_AFTER\" >&2; exit 1; fi; echo \"vm_cleanup_ok run_id=\$RUN_ID_AFTER count=\$COUNT\"'"

images:
  - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$BUILD_ID
  - ${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 3600s
