name: Render KeepAlive

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/render-keepalive.yml
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

concurrency:
  group: render-keepalive
  cancel-in-progress: false

env:
  DEFAULT_HEALTHCHECK_URL: https://jobsearchai-e63j.onrender.com/health

jobs:
  ping:
    name: Ping health endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Resolve target URL
        id: target
        env:
          OVERRIDE_URL: ${{ vars.RENDER_HEALTHCHECK_URL }}
        run: |
          TARGET_URL="${OVERRIDE_URL:-$DEFAULT_HEALTHCHECK_URL}"
          echo "url=$TARGET_URL" >> "$GITHUB_OUTPUT"
          echo "Target URL: $TARGET_URL"

      - name: Call Render health endpoint
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
        run: |
          echo "Started at: $(TZ=Asia/Seoul date +'%Y-%m-%dT%H:%M:%S%z')"
          curl --fail --show-error --silent \
            --max-time 60 \
            --retry 2 \
            "$TARGET_URL"
          echo
          echo "Keep-alive ping succeeded."
